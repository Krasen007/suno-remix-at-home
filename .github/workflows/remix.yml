name: Remix MP3s

on:
  workflow_dispatch:
  push:
    paths:
      - 'remix.py'

jobs:
  remix:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Set up virtual environment
      run: |
        python -m venv .venv
        source .venv/bin/activate
        pip install -r requirements.txt
    
    - name: Run remix script
      env:
        # noinspection GitHubActionsMissingSecret
        SUNO_API_KEY: ${{ secrets.SUNO_API_KEY }}
      run: |
        source .venv/bin/activate
        python remix.py
    
    - name: Upload results
      uses: actions/upload-artifact@v3
      with:
        name: remix-results
        path: |
          remix_results.json
          remixes/
